# SDD Configuration — Template Base

# Base version do framework
base_version: "2.0.0"

# Identificação do contexto
context: "your-context-name"
description: "Descrição breve do seu contexto — Stack"

# Padrão arquitetural
architecture:
  pattern: "clean-architecture"  # clean-architecture, hexagonal, onion, etc
  ui_framework: "framework-name"  # compose, react, flutter, etc
  state_management: "pattern-name"  # mvi, redux, bloc, event-driven, etc
  language: "language"  # kotlin, typescript, python, go, rust, etc

# Agentes especializados (7 obrigatórios)
agents:
  feat:
    file: "agents/feature-writer.md"
    active: true
  design:
    file: "agents/designer.md"
    active: true
  plan:
    file: "agents/planner.md"
    active: true
  arch:
    file: "agents/architect.md"
    active: true
  code:
    file: "agents/coder.md"
    active: true
  test:
    file: "agents/tester.md"
    active: true
  pr:
    file: "agents/pr-agent.md"
    active: true

# Skills reutilizáveis (6)
skills:
  git-flow:
    file: "skills/git-workflow.md"
    active: true
  code-arch:
    file: "skills/code-architecture.md"
    active: true
    customization: "Customization notes here"
  exec-plan:
    file: "skills/execution-plan.md"
    active: true
  test-strat:
    file: "skills/testing-strategy.md"
    active: true
    customization: "Testing tools and frameworks"
  pr-create:
    file: "skills/pr-creation.md"
    active: true
  code-rev:
    file: "skills/code-review.md"
    active: true

# Documentação (5 obrigatórios)
docs:
  project-context:
    file: "docs/project-context.md"
  architecture:
    file: "docs/architecture.md"
  features:
    file: "docs/features.md"
  tech-stack:
    file: "docs/tech-stack.md"
  glossary:
    file: "docs/glossary.md"

# Metadados (opcional)
metadata:
  author: "Your name"
  email: "your@email.com"
  created_at: "2026-01-01"
  updated_at: "2026-01-01"
  github_repo: "https://github.com/your/repo"
  license: "MIT"
  tags:
    - "clean-architecture"
    - "kotlin"
    - "compose"

# Dependencies (opcional, para Phase 3 marketplace)
dependencies:
  base-sdd: "^2.0.0"
  # designer-kit-material3: "^1.2.0"

# Version compatibility
version_info:
  semantic: "1.0.0"
  compatibility_range: "^1.0.0"
  breaking_changes: []
