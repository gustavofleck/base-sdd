# SDD Configuration — Specification Driven Development

# Base version do framework
base_version: "2.0.0"

# Identificação do contexto
context: "your-project-name"
description: "Descrição breve do seu projeto"

# Padrão de desenvolvimento
development:
  methodology: "specification-driven-development"
  approach: "behavior-driven-design"  # BDD, TDD, etc

# Agentes especializados (6 obrigatórios)
# Cada agente é uma persona especializada que toma decisões
# Veja docs/agents-vs-skills.md para entender a diferença com skills
agents:
  orchestrator:
    file: "agents/orchestrator.md"
    active: true
    primary: true
  feat:
    file: "agents/feature-writer.md"
    active: true
  arch:
    file: "agents/architect.md"
    active: true
  code:
    file: "agents/coder.md"
    active: true
  test:
    file: "agents/tester.md"
    active: true
  pr:
    file: "agents/pr-agent.md"
    active: true

# Skills reutilizáveis (6)
# Skills são procedimentos carregados SOB DEMANDA pelos agentes
# Veja docs/agents-vs-skills.md para entender quando usar skills vs agentes
skills:
  git-flow:
    file: "skills/git-workflow.md"
    active: true
  code-arch:
    file: "skills/code-architecture.md"
    active: true
  exec-plan:
    file: "skills/execution-plan.md"
    active: true
  test-strat:
    file: "skills/testing-strategy.md"
    active: true
  pr-create:
    file: "skills/pr-creation.md"
    active: true
  code-rev:
    file: "skills/code-review.md"
    active: true

# Documentação (7 obrigatórios)
docs:
  agents-vs-skills:
    file: "docs/agents-vs-skills.md"
    description: "Decision framework para quando usar agentes vs skills"
  project-context:
    file: "docs/project-context.md"
  specifications:
    file: "docs/specifications.md"
  architecture:
    file: "docs/architecture.md"
  guidelines:
    file: "docs/guidelines.md"
  glossary:
    file: "docs/glossary.md"

# Metadados (opcional)
metadata:
  author: "Your name"
  email: "your@email.com"
  created_at: "2026-01-01"
  updated_at: "2026-01-01"
  repository: "https://github.com/your/repo"
  license: "MIT"
  tags:
    - "specification-driven-development"
    - "behavior-driven-design"

# Dependencies (opcional, para Phase 3 marketplace)
dependencies:
  base-sdd: "^2.0.0"

# Version compatibility
version_info:
  semantic: "1.0.0"
  compatibility_range: "^1.0.0"
  breaking_changes: []
